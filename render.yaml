services:
  # ── Web Service ───────────────────────────────────────────────
  - type: web
    name: threatsync-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: threatsync-postgres
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false          # set manually in Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: CHROMA_PERSIST_DIR
        value: /tmp/chroma_db
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://threatsync-app.onrender.com"]'
      - key: APP_NAME
        value: ThreatSync AI Investigator
      - key: DEBUG
        value: "false"
      - key: API_AUTH_ENABLED
        value: "false"
      - key: APPROVAL_THRESHOLD
        value: "7.0"
      - key: RAG_TOP_K
        value: "5"

databases:
  # ── PostgreSQL ────────────────────────────────────────────────
  - name: threatsync-postgres
    region: oregon
    plan: free
    databaseName: threatsync
    user: threatsync
